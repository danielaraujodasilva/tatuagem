<!DOCTYPE html>

<body class="bg-zinc-950 text-white">

    <!-- Seu navbar, hero, designs, como-funciona, depoimentos, agendar (form) iguais ao anterior... -->

    <!-- MODAL PAGAMENTO (PIX + Mercado Pago) -->
    <div id="modalPagamento" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl max-w-md w-full mx-4 p-8 text-center">
            <h3 class="text-3xl font-bold mb-6">Pagamento de R$ 249,90</h3>
            
            <!-- PIX Manual -->
            <div class="mb-10">
                <h4 class="text-xl font-semibold mb-4">PIX Manual (Instantâneo)</h4>
                <img src="SUA_URL_QR_CODE_OU_IMAGEM_QR_AQUI.png" class="mx-auto rounded-2xl mb-4 w-48 h-48" alt="QR Code PIX">
                <div class="bg-zinc-800 p-4 rounded-2xl mb-4">
                    <p class="text-sm text-zinc-400">Chave PIX</p>
                    <p id="chavePix" class="font-mono text-lg">SUA_CHAVE_PIX_AQUI@email.com</p>

                </div>
                <button onclick="enviarComprovante()" class="w-full bg-green-600 py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-3">
                    <i class="fab fa-whatsapp"></i> Enviar Comprovante no Whats
                </button>
            </div>
            
            <!-- Mercado Pago Online -->
            <div>
                <h4 class="text-xl font-semibold mb-4">Pagar online (Cartão, Boleto ou Pix)</h4>
                <button id="pagarMercadoPago" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-2xl font-bold text-xl transition flex items-center justify-center gap-3">
                    <i class="fas fa-credit-card"></i> PAGAR AGORA ONLINE
                </button>
                <p class="text-xs text-zinc-500 mt-2">Seguro pelo Mercado Pago</p>
            </div>
            
            <button onclick="document.getElementById('modalPagamento').classList.add('hidden')" class="mt-8 text-zinc-400 text-sm underline">Fechar</button>
        </div>
    </div>

    <!-- Scripts no final -->
    <script>
        // Inicializa Mercado Pago com Public Key TEST
        const mp = new MercadoPago('APP_USR-a4eb5361-7b17-4d43-9e04-8be1ca2225e6', { locale: 'pt-BR' });

        // Countdown (ajuste data)
        function countdown() {
            const end = new Date("2026-03-10T23:59:59-03:00").getTime();
            setInterval(() => {
                const dist = end - Date.now();
                if (dist < 0) return document.getElementById("countdown").innerHTML = "Promo encerrada!";
                const d = Math.floor(dist / 86400000);
                const h = Math.floor((dist % 86400000) / 3600000);
                const m = Math.floor((dist % 3600000) / 60000);
                document.getElementById("countdown").innerHTML = `${d}d ${h}h ${m}m`;
            }, 60000);
        }
        countdown();

        // Galeria (ajuste imagens/nomes)
        const flashes = [ /* seu array */ ];
        // ... seu código de galeria ...

        // Form abre modal
        document.getElementById("bookingForm").addEventListener("submit", e => {
            e.preventDefault();
            document.getElementById("modalPagamento").classList.remove("hidden");
        });

        // Enviar comprovante PIX
        function enviarComprovante() {
            const numero = "5511999999999"; // TROQUE PELO SEU
            const texto = encodeURIComponent("Oi! Fiz o PIX R$249,90 Flash Tattoo. Comprovante em anexo.");
            window.open(`https://wa.me/${numero}?text=${texto}`, "_blank");
        }

        // Clique no botão Mercado Pago (chama backend PHP)
        document.getElementById('pagarMercadoPago').addEventListener('click', async () => {
            const nome = document.getElementById('nome').value.trim();
            const whatsapp = document.getElementById('whatsapp').value.trim();
            const design = document.getElementById('design').value.trim();

            if (!nome || !whatsapp || !design) {
                alert('Preencha os campos obrigatórios!');
                return;
            }

            try {
                const res = await fetch('criar-preferencia.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, whatsapp, design })
                });
                const data = await res.json();

                if (data.id) {
                    mp.checkout({ preference: { id: data.id }, autoOpen: true });
                } else {
                    alert('Erro: ' + (data.error || 'Tente novamente'));
                }
            } catch (err) {
                alert('Erro de conexão. Verifique o servidor.');
                console.error(err);
            }
        });
    </script>
</body>
