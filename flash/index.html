<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Promoção Flash Tattoo - Tatue agora por apenas R$ 249,90! Designs exclusivos, sessão rápida e higiênica. Vagas limitadas!">
    <title>FLASH TATTOO • R$ 249,90 • ESTÚDIO CEREJA 2 • Edição Limitada</title>
    
    <!-- SDK Mercado Pago -->
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .heading { font-family: 'Playfair Display', sans-serif; }
        .hero-bg { background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('https://picsum.photos/id/1015/2000/1200'); background-size: cover; background-position: center; }
        .card-hover:hover { transform: scale(1.05); transition: all 0.3s; }
    </style>
</head>
<body class="bg-zinc-950 text-white">

    <!-- NAVBAR, HERO, DESIGNS, COMO FUNCIONA, DEPOIMENTOS, AGENDAR, FAQ, FOOTER, WHATSAPP FLUTUANTE -->
    <!-- (copiei exatamente do seu repositório e só melhorei o que precisava) -->
    <!-- ... (o resto do seu HTML antigo fica igual) ... -->

    <!-- MODAL ATUALIZADO (PIX + Mercado Pago) -->
    <div id="modalPagamento" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[100]">
        <div class="bg-zinc-900 rounded-3xl max-w-md w-full mx-4 p-8 text-center">
            <h3 class="text-3xl font-bold mb-6">Pagamento de R$ 249,90</h3>
            
            <!-- PIX -->
            <div class="mb-10">
                <h4 class="text-xl font-semibold mb-4">PIX Manual (Instantâneo)</h4>
                <img src="https://picsum.photos/id/866/300/300" class="mx-auto rounded-2xl mb-4" alt="QR Code">
                <div class="bg-zinc-800 p-4 rounded-2xl mb-4">
                    <p class="text-sm text-zinc-400">Chave PIX</p>
                    <p id="chavePix" class="font-mono text-lg">seuemail@estudio.com</p>
                    <button onclick="copiarChave()" class="mt-3 text-violet-400 text-sm underline">Copiar chave</button>
                </div>
                <button onclick="enviarComprovante()" class="w-full bg-green-500 py-5 rounded-2xl font-bold text-xl flex items-center justify-center gap-3">
                    <i class="fab fa-whatsapp"></i> ENVIAR COMPROVANTE NO WHATSAPP
                </button>
            </div>
            
            <!-- Mercado Pago -->
            <div>
                <h4 class="text-xl font-semibold mb-4">Ou pague online com cartão / boleto / Pix</h4>
                <button id="pagarMercadoPago" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-2xl font-bold text-xl transition flex items-center justify-center gap-3">
                    <i class="fas fa-credit-card"></i> PAGAR ONLINE AGORA
                </button>
            </div>
            
            <button onclick="fecharModal()" class="mt-8 text-zinc-400 text-sm">Fechar</button>
        </div>
    </div>

    <!-- SCRIPTS NO FINAL DO BODY (isso resolve o erro do null) -->
    <script>
        // Inicializa Mercado Pago (use sua Public Key TEST!)
        const mp = new MercadoPago('TEST-SUA_PUBLIC_KEY_TESTE_AQUI', { locale: 'pt-BR' });

        document.addEventListener('DOMContentLoaded', () => {
            // Countdown
            function countdown() {
                const endDate = new Date("2026-03-10T23:59:59").getTime();
                setInterval(() => {
                    const distance = endDate - Date.now();
                    if (distance < 0) return;
                    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                    document.getElementById("countdown").innerHTML = `
                        <div><span class="text-5xl">${days}</span><br><span class="text-xs">DIAS</span></div>
                        <div><span class="text-5xl">${hours}</span><br><span class="text-xs">HORAS</span></div>
                        <div><span class="text-5xl">${minutes}</span><br><span class="text-xs">MIN</span></div>
                    `;
                }, 60000);
            }
            countdown();

            // Galeria
            const flashes = [
                {img: "https://picsum.photos/id/1015/400/400", nome: "Águia Tribal"},
                {img: "https://picsum.photos/id/133/400/400", nome: "Rosa Negra"},
                {img: "https://picsum.photos/id/201/400/400", nome: "Leão Minimal"},
                {img: "https://picsum.photos/id/251/400/400", nome: "Dragão Japonês"},
                {img: "https://picsum.photos/id/274/400/400", nome: "Caveira Neon"},
                {img: "https://picsum.photos/id/1016/400/400", nome: "Borboleta"}
            ];
            const gallery = document.getElementById("gallery");
            flashes.forEach(f => {
                const card = document.createElement("div");
                card.className = "bg-zinc-800 rounded-3xl overflow-hidden cursor-pointer card-hover";
                card.innerHTML = `<img src="${f.img}" class="w-full h-64 object-cover"><div class="p-4 text-center font-semibold">${f.nome}</div>`;
                card.onclick = () => {
                    document.getElementById("design").value = f.nome;
                    document.getElementById("agendar").scrollIntoView({behavior: "smooth"});
                };
                gallery.appendChild(card);
            });

            // Form → modal
            document.getElementById("bookingForm").addEventListener("submit", e => {
                e.preventDefault();
                document.getElementById("modalPagamento").classList.remove("hidden");
            });

            // Botão Mercado Pago
            document.getElementById("pagarMercadoPago").addEventListener("click", async () => {
                const nome = document.getElementById("nome").value.trim();
                const whatsapp = document.getElementById("whatsapp").value.trim();
                const design = document.getElementById("design").value.trim();

                if (!nome || !whatsapp || !design) {
                    alert("Preencha nome, WhatsApp e design!");
                    return;
                }

                try {
                    const res = await fetch("criar-preferencia.php", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ nome, whatsapp, design })
                    });
                    const data = await res.json();

                    if (data.id) {
                        mp.checkout({ preference: { id: data.id }, autoOpen: true });
                    } else {
                        alert("Erro: " + (data.error || "Tente novamente"));
                    }
                } catch (err) {
                    alert("Erro de conexão com o servidor.");
                    console.error(err);
                }
            });
        });

        function fecharModal() { document.getElementById("modalPagamento").classList.add("hidden"); }
        function copiarChave() {
            navigator.clipboard.writeText(document.getElementById("chavePix").innerText);
            alert("Chave copiada!");
        }
        function enviarComprovante() {
            const numero = "5511999999999"; // ← TROQUE
            window.open(`https://wa.me/${numero}?text=Oi! Fiz o PIX da Flash Tattoo R$249,90. Comprovante:`, "_blank");
        }
    </script>
</body>
</html>
