    <circle cx="360" cy="470" r="140" stroke-dasharray="10 16"/>
  </g>
  <text x="88" y="190" fill="#bfe985" font-family="Arial, Helvetica, sans-serif" font-size="26" letter-spacing="6">CNJP</text>
  <text x="88" y="298" fill="#f7f7f2" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700">Conciliação</text>
  <text x="88" y="376" fill="#f7f7f2" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700">extrajudicial online</text>
  <text x="88" y="456" fill="#d0dbd3" font-family="Arial, Helvetica, sans-serif" font-size="30">Triagem gratuita para entender se existe caminho para acordo antes do processo.</text>
  <rect x="88" y="498" width="330" height="56" rx="16" fill="#bfe985"/>
  <text x="118" y="534" fill="#06100d" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Atendimento online em todo o Brasil</text>
