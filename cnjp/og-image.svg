<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="CNJP - conciliação extrajudicial online">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#06100d"/>
      <stop offset="55%" stop-color="#0a1a15"/>
      <stop offset="100%" stop-color="#13241d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c7f08d" stop-opacity=".35"/>
      <stop offset="45%" stop-color="#84c18d" stop-opacity=".14"/>
      <stop offset="100%" stop-color="#84c18d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="890" cy="180" r="260" fill="url(#glow)"/>
  <circle cx="360" cy="470" r="210" fill="url(#glow)" opacity=".7"/>
